name: Docker Image CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      
    - name: Setup Java
      uses: actions/setup-java@v5
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Build Jar
      run: |
        chmod +x ./mvnw
        ./mvnw clean package -DskipTests
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest

    - name: SSH and Deploy to EC2
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Pull the fresh image
          docker pull ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest
          
          # 2. Cleanup by Port: Stop/Remove container blocking port 8080
          PORT_CONTAINER=$(docker ps -q --filter "publish=8080")
          if [ ! -z "$PORT_CONTAINER" ]; then
            docker stop $PORT_CONTAINER
            docker rm $PORT_CONTAINER
          fi
          
          # 3. Cleanup by Name: Force remove any existing container named 'spring-demo'
          # (This catches the one causing your current error)
          docker stop spring-demo || true
          docker rm -f spring-demo || true
          
          # 4. Run the new version
          docker run -d --name spring-demo -p 8080:8080 ${{ secrets.DOCKERHUB_USERNAME }}/spring-boot-ci-demo:latest
